name: Release Firmware

on:
  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - "config/**"
      - "tools/scripts/**"
      - ".github/workflows/firmware-build.yml"
      - ".github/workflows/release.yml"
      - ".github/release.yml"

env:
  TOOLCHAIN_VERSION: MRS_Toolchain_Linux_x64_V230

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ch592f:
    name: Package CH592F (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - 5KEY
          - KNOB
    container:
      image: ghcr.io/meowkj/binarykeyboard-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: python3 tools/scripts/ch592f.py build --keyboard ${{ matrix.keyboard }} --profile release

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch592f.py artifact --keyboard ${{ matrix.keyboard }} --profile release --type bin)" >> "$GITHUB_OUTPUT"
          echo "hex=$(python3 tools/scripts/ch592f.py artifact --keyboard ${{ matrix.keyboard }} --profile release --type hex)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch592f-${{ matrix.keyboard }}-${{ github.sha }}
          path: |
            ${{ steps.artifacts.outputs.bin }}
            ${{ steps.artifacts.outputs.hex }}
          retention-days: 7

  build-ch552g:
    name: Package CH552G (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - BASIC
          - KNOB
          - 5KEY

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc ninja-build

      - name: Build
        run: python3 tools/scripts/ch552g.py build --keyboard ${{ matrix.keyboard }}

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch552g.py artifact --keyboard ${{ matrix.keyboard }} --type bin)" >> "$GITHUB_OUTPUT"
          echo "hex=$(python3 tools/scripts/ch552g.py artifact --keyboard ${{ matrix.keyboard }} --type hex)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch552g-${{ matrix.keyboard }}-${{ github.sha }}
          path: |
            ${{ steps.artifacts.outputs.bin }}
            ${{ steps.artifacts.outputs.hex }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-ch592f
      - build-ch552g
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.sha }}
          path: dist
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +%Y%m%d)
          DATE_DISPLAY=$(date +%F)
          SHA=$(git rev-parse --short HEAD)
          PRODUCT_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from versioning import product_version; print(product_version())")
          CH592_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch592_version; print(ch592_version())")
          CH552_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch552_version; print(ch552_version())")
          echo "date=${DATE_DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "tag=binarykeyboard-v${PRODUCT_VERSION}-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=BinaryKeyboard v${PRODUCT_VERSION} · ${DATE_DISPLAY}" >> "$GITHUB_OUTPUT"
          {
            echo "## Release Summary"
            echo
            echo "- Product: v${PRODUCT_VERSION}"
            echo "- CH592F: v${CH592_VERSION}"
            echo "- CH552G: v${CH552_VERSION}"
            echo "- Build date: ${DATE_DISPLAY}"
            echo "- Commit: ${SHA}"
            echo "- Toolchain: ${{ env.TOOLCHAIN_VERSION }}"
            echo "- Artifacts: standard firmware package set for CH592F and CH552G"
          } > release-notes-header.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
          body_path: release-notes-header.md
          prerelease: true
          files: |
            dist/*.bin
            dist/*.hex
