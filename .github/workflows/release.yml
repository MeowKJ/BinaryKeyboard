name: Release Firmware

on:
  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - "config/**"
      - "tools/studio/**"
      - "tools/scripts/**"
      - ".github/workflows/firmware-build.yml"
      - ".github/workflows/release.yml"
      - ".github/release.yml"
  workflow_dispatch:

env:
  TOOLCHAIN_VERSION: MRS_Toolchain_Linux_x64_V230

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ch592f:
    name: Package CH592F (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - 5KEY
          - KNOB
    container:
      image: ghcr.io/meowkj/binarykeyboard-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Python
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends python3

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: python3 tools/scripts/ch592f.py build --keyboard ${{ matrix.keyboard }} --profile release

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch592f.py artifact --keyboard ${{ matrix.keyboard }} --profile release --type bin)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch592f-${{ matrix.keyboard }}-${{ github.sha }}
          path: ${{ steps.artifacts.outputs.bin }}
          retention-days: 7

      - name: Emit size report
        run: python3 tools/scripts/ch592f.py size-json --keyboard ${{ matrix.keyboard }} --profile release --out size-ch592f-${{ matrix.keyboard }}.json

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-ch592f-${{ matrix.keyboard }}
          path: size-ch592f-${{ matrix.keyboard }}.json

  build-ch552g:
    name: Package CH552G (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - BASIC
          - KNOB
          - 5KEY

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc ninja-build

      - name: Build
        run: python3 tools/scripts/ch552g.py build --keyboard ${{ matrix.keyboard }}

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch552g.py artifact --keyboard ${{ matrix.keyboard }} --type bin)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch552g-${{ matrix.keyboard }}-${{ github.sha }}
          path: ${{ steps.artifacts.outputs.bin }}
          retention-days: 7

      - name: Emit size report
        run: python3 tools/scripts/ch552g.py size-json --keyboard ${{ matrix.keyboard }} --out size-ch552g-${{ matrix.keyboard }}.json

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-ch552g-${{ matrix.keyboard }}
          path: size-ch552g-${{ matrix.keyboard }}.json

  build-studio:
    name: Build Studio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: tools/studio/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tools/studio
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --dir tools/studio run build

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-ch592f
      - build-ch552g
      - build-studio
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.sha }}
          path: dist
          merge-multiple: true

      - name: Download size reports
        uses: actions/download-artifact@v4
        with:
          pattern: size-*
          path: sizes
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +%Y%m%d)
          DATE_DISPLAY=$(date +%F)
          SHA=$(git rev-parse --short HEAD)
          TAG="binarykeyboard-${DATE}-${SHA}"
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags \
            | grep '^binarykeyboard-' \
            | grep -Fvx "$TAG" \
            | head -n 1 || true)
          STUDIO_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from versioning import studio_version; print(studio_version())")
          CH592_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch592_version; print(ch592_version())")
          CH552_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch552_version; print(ch552_version())")
          echo "date=${DATE_DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${DATE_DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          # Collect tool versions
          CMAKE_VER=$(cmake --version 2>/dev/null | head -1 | awk '{print $3}' || echo "N/A")
          PYTHON_VER=$(python3 --version 2>/dev/null | awk '{print $2}' || echo "N/A")
          SDCC_VER=$(apt-cache show sdcc 2>/dev/null | grep -m1 '^Version:' | awk '{print $2}' || echo "N/A")

          # Flash size limits (bytes)
          CH552G_FLASH=14336   # 14 KB
          CH592F_FLASH=458752  # 448 KB

          # Build file table with sizes and flash usage
          {
            echo "## 🐱 BinaryKeyboard 自动发布"
            echo
            echo "> 此 Release 由 GitHub Actions 自动构建并发布，基于 \`main\` 分支最新提交。"
            echo
            echo "### 📋 版本信息"
            echo
            echo "| 组件 | 版本 | 说明 |"
            echo "|------|------|------|"
            echo "| 🎹 Studio | v${STUDIO_VERSION} | 改键工具（Web） |"
            echo "| 📡 CH592F | v${CH592_VERSION} | 无线固件（BLE） |"
            echo "| 🔌 CH552G | v${CH552_VERSION} | 有线固件（USB） |"
            echo
            echo "### 📦 固件文件"
            echo
            echo "| 文件 | 大小 | Flash 占用 | RAM 占用 | 说明 |"
            echo "|------|------|-----------|----------|------|"
            for f in dist/*.bin; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              fsize_bytes=$(stat -c%s "$f")
              fsize=$(numfmt --to=iec-i --suffix=B "$fsize_bytes")
              chip=${fname%%-*}
              keyboard_tmp=${fname#${chip}-}
              keyboard=${keyboard_tmp%%-*}
              desc=""
              ram_info="—"
              flash_total=0
              case "$fname" in
                CH592F*) desc="📡 无线"; flash_total=$CH592F_FLASH ;;
                CH552G*) desc="🔌 有线"; flash_total=$CH552G_FLASH ;;
              esac
              case "$fname" in
                *-5KEY-*)  desc="${desc} · 五键" ;;
                *-KNOB-*)  desc="${desc} · 旋钮" ;;
                *-BASIC-*) desc="${desc} · 基础" ;;
              esac
              if [ "$flash_total" -gt 0 ]; then
                pct=$((fsize_bytes * 100 / flash_total))
                flash_total_h=$(numfmt --to=iec-i --suffix=B "$flash_total")
                bar_len=$((pct / 5))
                bar=$(printf '█%.0s' $(seq 1 $bar_len 2>/dev/null) 2>/dev/null || true)
                pad_len=$((20 - bar_len))
                pad=$(printf '░%.0s' $(seq 1 $pad_len 2>/dev/null) 2>/dev/null || true)
                flash_info="${bar}${pad} ${pct}% (${flash_total_h})"
              else
                flash_info="—"
              fi
              if ls sizes/*.json >/dev/null 2>&1; then
                ram_info=$(python3 - "$chip" "$keyboard" <<'PY'
import json
import sys
from pathlib import Path

chip = sys.argv[1]
keyboard = sys.argv[2]

for path in Path("sizes").glob("*.json"):
    data = json.loads(path.read_text())
    if data.get("chip") != chip or data.get("keyboard") != keyboard:
        continue
    regions = data.get("regions", {})
    ram = regions.get("RAM") or regions.get("XRAM") or {}
    used = ram.get("used")
    total = ram.get("total")
    if used is None or not total:
        print("—")
    else:
        pct = used / total * 100
        print(f"{used / 1024:.1f} / {total / 1024:.1f} KB ({pct:.1f}%)")
    break
else:
    print("—")
PY
)
              fi
              echo "| \`${fname}\` | ${fsize} | ${flash_info} | ${ram_info} | ${desc} |"
            done
            echo
            echo "### 🔧 构建环境"
            echo
            echo "| 属性 | 值 |"
            echo "|------|------|"
            echo "| 构建日期 | ${DATE_DISPLAY} |"
            echo "| Commit | [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA}) |"
            echo "| Runner | \`ubuntu-latest\` |"
            echo "| CH592F 工具链 | \`${{ env.TOOLCHAIN_VERSION }}\`（RISC-V GCC 12） |"
            echo "| SDCC | \`${SDCC_VER}\` |"
            echo "| CMake | \`${CMAKE_VER}\` |"
            echo "| Python | \`${PYTHON_VER}\` |"
            echo
            echo "### 📝 变更记录"
            echo
            if [ -n "$PREV_TAG" ]; then
              COMMIT_RANGE="${PREV_TAG}..HEAD"
              COMMIT_COUNT=$(git rev-list --count "${COMMIT_RANGE}")
              echo "> 共 ${COMMIT_COUNT} 个 commit，自 \`${PREV_TAG}\` 以来。"
              echo "> [完整对比](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})"
            else
              COMMIT_RANGE="HEAD"
              COMMIT_COUNT=$(git rev-list --count HEAD)
              echo "> 首次自动发布，当前共 ${COMMIT_COUNT} 个 commit。"
            fi
            echo
            # 列出合并的 PR（标题 + PR号 + 作者）
            git log --reverse --merges --pretty=format:'- %s (@%an)' "${COMMIT_RANGE}" 2>/dev/null | head -50 || true
            # 列出非合并的直接提交
            git log --reverse --no-merges --pretty=format:'- %s ([`%h`](https://github.com/${{ github.repository }}/commit/%H))' "${COMMIT_RANGE}"
            echo
            echo
            echo "<details><summary>🔒 SHA-256 校验值</summary>"
            echo
            echo '```'
            for f in dist/*.bin; do
              [ -f "$f" ] || continue
              sha256sum "$f" | sed 's|dist/||'
            done
            echo '```'
            echo
            echo "</details>"
          } > release-notes-header.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release-notes-header.md
          generate_release_notes: true
          append_body: true
          prerelease: false
          files: dist/*.bin
