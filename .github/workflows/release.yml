name: Release Firmware

on:
  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - "config/**"
      - "tools/studio/**"
      - "tools/scripts/**"
      - ".github/workflows/firmware-build.yml"
      - ".github/workflows/release.yml"
      - ".github/release.yml"
  workflow_dispatch:

env:
  TOOLCHAIN_VERSION: MRS_Toolchain_Linux_x64_V230

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ch592f:
    name: Package CH592F (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - 5KEY
          - KNOB
    container:
      image: ghcr.io/meowkj/binarykeyboard-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Python
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends python3

      - name: Build
        run: python3 tools/scripts/ch592f.py build --keyboard ${{ matrix.keyboard }} --profile release

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch592f.py artifact --keyboard ${{ matrix.keyboard }} --profile release --type bin)" >> "$GITHUB_OUTPUT"
          echo "hex=$(python3 tools/scripts/ch592f.py artifact --keyboard ${{ matrix.keyboard }} --profile release --type hex)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch592f-${{ matrix.keyboard }}-${{ github.sha }}
          path: |
            ${{ steps.artifacts.outputs.bin }}
            ${{ steps.artifacts.outputs.hex }}
          retention-days: 7

  build-ch552g:
    name: Package CH552G (${{ matrix.keyboard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keyboard:
          - BASIC
          - KNOB
          - 5KEY

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install SDCC
        run: |
          sudo apt-get update
          sudo apt-get install -y sdcc ninja-build

      - name: Build
        run: python3 tools/scripts/ch552g.py build --keyboard ${{ matrix.keyboard }}

      - name: Resolve artifacts
        id: artifacts
        run: |
          echo "bin=$(python3 tools/scripts/ch552g.py artifact --keyboard ${{ matrix.keyboard }} --type bin)" >> "$GITHUB_OUTPUT"
          echo "hex=$(python3 tools/scripts/ch552g.py artifact --keyboard ${{ matrix.keyboard }} --type hex)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ch552g-${{ matrix.keyboard }}-${{ github.sha }}
          path: |
            ${{ steps.artifacts.outputs.bin }}
            ${{ steps.artifacts.outputs.hex }}
          retention-days: 7

  build-studio:
    name: Build Studio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: tools/studio/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tools/studio
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --dir tools/studio run build

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-ch592f
      - build-ch552g
      - build-studio
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.sha }}
          path: dist
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +%Y%m%d)
          DATE_DISPLAY=$(date +%F)
          SHA=$(git rev-parse --short HEAD)
          STUDIO_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from versioning import studio_version; print(studio_version())")
          CH592_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch592_version; print(ch592_version())")
          CH552_VERSION=$(python3 -c "import sys; sys.path.insert(0, 'tools/scripts'); from firmware_naming import ch552_version; print(ch552_version())")
          echo "date=${DATE_DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "tag=binarykeyboard-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=BinaryKeyboard ¬Ζ Studio v${STUDIO_VERSION} ¬Ζ CH552 v${CH552_VERSION} ¬Ζ CH592 v${CH592_VERSION}" >> "$GITHUB_OUTPUT"

          # Build file table with sizes and SHA-256
          {
            echo "## πüê± BinaryKeyboard η΅Σεä®εèëεΗÉ"
            echo
            echo "> φ≠Λ Release γî± GitHub Actions η΅Σεä®φû³εΜΚεΙΕεèëεΗÉοΦ¨εüΚδΚé \`main\` εàÜφî·φ€Äφ•ΑφèêδΚΛψÄ²"
            echo
            echo "### πü™΄ γâàφ€§δΩΓφ¹·"
            echo
            echo "| γΜ³δΜΕ | γâàφ€§ |"
            echo "|------|------|"
            echo "| StudioοΦàφîΙιî°εΖΞεÖΖοΦâ | v${STUDIO_VERSION} |"
            echo "| CH592FοΦàφ½†γΚΩε¦ΚδΜΕοΦâ | v${CH592_VERSION} |"
            echo "| CH552GοΦàφ€âγΚΩε¦ΚδΜΕοΦâ | v${CH552_VERSION} |"
            echo
            echo "### πü™Π ε¦ΚδΜΕφ•΅δΜΕ"
            echo
            echo "| φ•΅δΜΕ | εΛßεΑè | SHA-256 |"
            echo "|------|------|---------|"
            for f in dist/*.bin dist/*.hex; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              fsize=$(du -h "$f" | cut -f1)
              fsha=$(sha256sum "$f" | cut -d' ' -f1)
              echo "| \`${fname}\` | ${fsize} | \`${fsha:0:16}βÄΠ\` |"
            done
            echo
            echo "### β³ΙοΗè φû³εΜΚγé·εΔÉ"
            echo
            echo "- **φû³εΜΚφ½Ξφ€ü**: ${DATE_DISPLAY}"
            echo "- **Commit**: [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})"
            echo "- **εΖΞεÖΖι™Ψ**: ${{ env.TOOLCHAIN_VERSION }}"
            echo
            echo "<details><summary>SHA-256 ε°¨φï¥φ†ΓιΣ¨εÄΦ</summary>"
            echo
            echo '```'
            for f in dist/*.bin dist/*.hex; do
              [ -f "$f" ] || continue
              sha256sum "$f" | sed 's|dist/||'
            done
            echo '```'
            echo
            echo "</details>"
          } > release-notes-header.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
          body_path: release-notes-header.md
          prerelease: false
          files: |
            dist/*.bin
            dist/*.hex
